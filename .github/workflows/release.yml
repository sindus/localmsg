name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" --title "${GITHUB_REF_NAME}" --generate-notes

  build-linux:
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: sudo apt-get update && sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev
      - run: flutter pub get
      - run: flutter build linux --release

      - name: Package .deb
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          BUNDLE="build/linux/x64/release/bundle"
          PKG="pkgroot"
          rm -rf "$PKG"
          mkdir -p "$PKG/opt/localmsg" "$PKG/usr/bin" "$PKG/usr/share/applications" "$PKG/usr/share/icons/hicolor/256x256/apps" "$PKG/DEBIAN"
          cp -a "$BUNDLE"/. "$PKG/opt/localmsg/"
          ln -s /opt/localmsg/localmsg "$PKG/usr/bin/localmsg"
          cp packaging/linux/localmsg.desktop "$PKG/usr/share/applications/localmsg.desktop"
          cp macos/Runner/Assets.xcassets/AppIcon.appiconset/app_icon_256.png "$PKG/usr/share/icons/hicolor/256x256/apps/localmsg.png"
          sed "s/__VERSION__/${VERSION}/" packaging/linux/control.template > "$PKG/DEBIAN/control"
          echo "--- ldd (informational, cross-check against Depends in control.template) ---"
          ldd "$BUNDLE/localmsg" || true
          dpkg-deb --build --root-owner-group "$PKG" localmsg.deb

      - name: Package AppImage
        run: |
          export APPIMAGE_EXTRACT_AND_RUN=1
          BUNDLE="build/linux/x64/release/bundle"
          APPDIR="AppDir"
          rm -rf "$APPDIR"
          mkdir -p "$APPDIR/usr/bin"
          # Copy the whole bundle (executable + lib/ + data/) verbatim: libapp.so and
          # libflutter_linux_gtk.so are dlopen()'d at runtime, so linuxdeploy's linked-lib
          # scanner never sees them and won't copy them on its own.
          cp -a "$BUNDLE"/. "$APPDIR/usr/bin/"

          # linuxdeploy matches the icon file's basename against the .desktop
          # Icon= key, so it must be named exactly "localmsg.png".
          cp macos/Runner/Assets.xcassets/AppIcon.appiconset/app_icon_256.png localmsg.png

          curl -fsSL -o linuxdeploy -L "https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage"
          curl -fsSL -o appimagetool -L "https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage"
          chmod +x linuxdeploy appimagetool

          ./linuxdeploy --appdir "$APPDIR" \
            -e "$APPDIR/usr/bin/localmsg" \
            -d packaging/linux/localmsg.desktop \
            -i localmsg.png

          ./appimagetool "$APPDIR" localmsg.AppImage

      - env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${GITHUB_REF_NAME}" localmsg.deb localmsg.AppImage --clobber

  build-macos:
    needs: create-release
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter build macos --release

      - name: Zip app bundle
        run: |
          cd build/macos/Build/Products/Release
          ditto -c -k --sequesterRsrc --keepParent localmsg.app "$GITHUB_WORKSPACE/localmsg-macos.zip"

      - env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${GITHUB_REF_NAME}" localmsg-macos.zip --clobber

      - name: Update Homebrew Cask
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          SHA=$(shasum -a 256 localmsg-macos.zip | awk '{print $1}')
          sed -i '' "s/version \".*\"/version \"${VERSION}\"/" Casks/localmsg.rb
          sed -i '' "s/sha256 .*/sha256 \"${SHA}\"/" Casks/localmsg.rb
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Casks/localmsg.rb
          git commit -m "chore: update Homebrew Cask to ${GITHUB_REF_NAME}"
          git push origin HEAD:main

  build-windows:
    needs: create-release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter build windows --release

      - name: Compile installer
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) {
            choco install innosetup -y
          }
          $version = "${env:GITHUB_REF_NAME}".TrimStart("v")
          & $iscc "/DMyAppVersion=$version" "packaging\windows\installer.iss"

      - env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${env:GITHUB_REF_NAME}" packaging/windows/localmsg-setup.exe --clobber
